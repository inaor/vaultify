# Build multi-platform binaries and publish a GitHub Release when you push a tag: v1.2.3
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="vaultify_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.suffix }}"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w -X github.com/vaultify/vaultify/internal/buildinfo.BuildVersion=${VERSION}" \
            -o "$OUT" ./cmd/vaultify
          if [ "${{ matrix.goos }}" != "windows" ]; then chmod +x "$OUT"; fi
          ls -la "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.build.outputs.out }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stage release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          find artifacts -type f \( -name 'vaultify_*' -o -name 'vaultify_*.exe' \) -print -exec cp -f {} dist/ \;
          if [ ! "$(find dist -maxdepth 1 -type f -name 'vaultify_*' | wc -l)" -ge 1 ]; then
            echo "::error::No vaultify_* binaries found under artifacts/"
            find artifacts -type f || true
            exit 1
          fi
          for f in dist/vaultify_*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.exe) ;;
              *) chmod +x "$f" ;;
            esac
          done

          # Generate per-platform icon assets so the release ships the
          # same shell-level branding on macOS and Linux that Windows
          # gets via the embedded .syso resource.
          if command -v iconutil >/dev/null && command -v sips >/dev/null; then
            bash scripts/generate-macos-icon.sh internal/web/assets/vaultify_logo.png dist/Vaultify.icns
          else
            go run ./tools/icogen -format icns -in internal/web/assets/vaultify_logo.png -out dist/Vaultify.icns
          fi
          go run ./tools/icogen -format png-set -in internal/web/assets/vaultify_logo.png -out dist/linux-icons
          ( cd dist && tar czf vaultify_${VERSION}_linux-icons.tar.gz linux-icons )

          # Wrap each darwin binary in a Vaultify.app bundle so users
          # get a native macOS app icon in Finder/Dock without having
          # to assemble the bundle themselves.
          for arch in amd64 arm64; do
            BIN="dist/vaultify_${VERSION}_darwin_${arch}"
            [ -f "$BIN" ] || continue
            APPDIR="dist/Vaultify-${arch}.app"
            mkdir -p "$APPDIR/Contents/MacOS" "$APPDIR/Contents/Resources"
            cp -f "$BIN" "$APPDIR/Contents/MacOS/vaultify"
            chmod +x "$APPDIR/Contents/MacOS/vaultify"
            cp -f dist/Vaultify.icns "$APPDIR/Contents/Resources/AppIcon.icns"
            cat > "$APPDIR/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Vaultify</string>
            <key>CFBundleDisplayName</key><string>Vaultify</string>
            <key>CFBundleIdentifier</key><string>app.vaultify.cli</string>
            <key>CFBundleExecutable</key><string>vaultify</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key><string>10.15</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
            ( cd dist && tar czf "vaultify_${VERSION}_darwin_${arch}.app.tar.gz" "Vaultify-${arch}.app" )
            rm -rf "$APPDIR"
          done

          cp -f LICENSE dist/LICENSE
          # Hash binaries AND ancillary release assets (icons, bundles)
          # so users can verify the icon set wasn't tampered with.
          ( cd dist && sha256sum vaultify_* Vaultify.icns > SHA256SUMS )
          echo "---- SHA256SUMS ----"
          cat dist/SHA256SUMS
          ls -la dist

      - name: Update releases/latest.json on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          DATE="$(date -u +%Y-%m-%d)"
          cat > /tmp/latest.json <<EOF
          {
            "schema": 1,
            "version": "${VERSION}",
            "released_at": "${DATE}",
            "release_url": "https://github.com/${REPO}/releases/tag/${TAG}",
            "download_url": "https://github.com/${REPO}/releases/latest",
            "install_script_url": "https://raw.githubusercontent.com/${REPO}/main/scripts/install.sh",
            "install_script_windows_url": "https://raw.githubusercontent.com/${REPO}/main/scripts/install.ps1"
          }
          EOF
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cp /tmp/latest.json releases/latest.json
          git add releases/latest.json
          git diff --staged --quiet && echo "releases/latest.json already up to date" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump releases/latest.json to v${VERSION}"
          git push origin main

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          append_body: true
          body: |
            ## Downloads

            | Asset | Platform |
            |-------|----------|
            | `vaultify_*_windows_amd64.exe` | Windows (x86_64) — icon embedded in the binary |
            | `vaultify_*_darwin_amd64` / `vaultify_*_darwin_arm64` | macOS bare CLI binaries |
            | `vaultify_*_darwin_amd64.app.tar.gz` / `*_darwin_arm64.app.tar.gz` | macOS `Vaultify.app` bundle (extracts to `Vaultify.app` with native dock/Finder icon) |
            | `vaultify_*_linux_amd64` / `vaultify_*_linux_arm64` | Linux bare CLI binaries |
            | `Vaultify.icns` | Standalone macOS icon (drop into your own bundle) |
            | `vaultify_*_linux-icons.tar.gz` | Linux hicolor PNG set + `vaultify.desktop` template (extract under `~/.local/share/icons/` and `~/.local/share/applications/`) |
            | `SHA256SUMS` | SHA-256 hashes for the binaries and `Vaultify.icns` |
            | `LICENSE` | MIT |

            ### Verify checksums

            Download `SHA256SUMS` next to your binary, then:

            - **Linux:** `sha256sum -c SHA256SUMS --ignore-missing`
            - **macOS:** `shasum -a 256 -c SHA256SUMS` (only if you downloaded every file listed in `SHA256SUMS`, or check one file: `shasum -a 256 vaultify_*` and compare to the file)
            - **Windows (PowerShell):** `Get-FileHash .\vaultify_*_windows_amd64.exe -Algorithm SHA256` and compare to the line in `SHA256SUMS`

            ### Install (recommended)

            - **macOS / Linux:** `curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash`
            - **Windows (PowerShell):** `irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex`

            After install, open a new terminal and run `vaultify` from any directory.

            ### Notes

            - Run `./vaultify` (or `vaultify.exe` on Windows). The dashboard opens at `http://localhost:9471` by default.
            - macOS binaries are **not** Apple-notarized; you may need to allow the app under **System Settings → Privacy & Security** the first time.
            - 1Password integration requires the [1Password CLI](https://developer.1password.com/docs/cli) (`op`) where you use vault features.
          files: |
            dist/vaultify_*
            dist/Vaultify.icns
            dist/SHA256SUMS
            dist/LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
